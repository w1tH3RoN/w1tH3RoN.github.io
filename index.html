<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Crystals Quest</title>
    <style>
        :root { --bg: #0d0e15; --panel: #161925; --neon-blue: #00f0ff; --neon-purple: #bd00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 450px; height: 100vh; max-height: 850px; display: flex; flex-direction: column; background: var(--panel); position: relative; box-shadow: 0 0 30px rgba(0,240,255,0.15); }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; justify-content: center; align-items: center; position: absolute; width: 100%; top: 0; left: 0; }
        .screen.active { display: flex; }
        h1 { font-size: 2.3rem; text-shadow: 0 0 12px var(--neon-blue); margin-bottom: 25px; text-align: center; font-weight: 800; }
        button { background: transparent; border: 2px solid var(--neon-blue); color: #fff; padding: 12px 25px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; margin: 8px 0; width: 85%; transition: 0.2s; text-shadow: 0 0 5px var(--neon-blue); box-shadow: inset 0 0 10px rgba(0,240,255,0.2); font-weight: bold; text-transform: uppercase; }
        button:active { background: var(--neon-blue); color: #000; text-shadow: none; box-shadow: 0 0 25px var(--neon-blue); }
        .hud { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 5px; background: rgba(0,0,0,0.4); font-size: 0.85rem; text-align: center; border-bottom: 2px solid rgba(0,240,255,0.1); }
        .hud div { font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.3); display: flex; flex-direction: column; justify-content: center; }
        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; overflow: hidden; background: rgba(0,0,0,0.25); }
        canvas { display: block; touch-action: none; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .shop-bar { width: 100%; display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.05); }
        .shop-btn { width: 45%; font-size: 0.9rem; padding: 8px; margin: 0; border-color: var(--neon-purple); text-shadow: 0 0 5px var(--neon-purple); box-shadow: inset 0 0 10px rgba(189,0,255,0.2); }
        .shop-btn.selected { border-color: #fff; box-shadow: 0 0 15px #fff; }
        .list-container { width: 100%; max-height: 250px; overflow-y: auto; margin-bottom: 20px; }
        .list-item { width: 100%; display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="app">
    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen active">
        <h1>NEON CRYSTALS</h1>
        <button onclick="startGame('campaign')">Старт Игры</button>
        <button onclick="showScreen('leaderboard-screen')">Рекорды</button>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="screen" style="padding:0;">
        <div class="hud">
            <div>Ур.<span id="hud-level" style="color:var(--neon-blue);">1</span></div>
            <div>Очки<span id="hud-score">0</span></div>
            <div>Баланс<span id="hud-money" style="color:#00ff66;">€0</span></div>
            <div>Цель:<span id="hud-target" style="font-size:0.75rem;margin-top:2px;">0/20</span></div>
        </div>
        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="shop-bar">
            <button id="btn-hammer" class="shop-btn" onclick="buyItem('hammer')">🔨 Молот (€150)</button>
            <button id="btn-bomb" class="shop-btn" onclick="buyItem('bomb')">💣 Бомба (€300)</button>
        </div>
        <button onclick="quitGame()" style="width:40%; margin: 10px auto; padding: 6px; font-size:0.9rem;">Выход</button>
    </div>

    <!-- ЛИДЕРЫ -->
    <div id="leaderboard-screen" class="screen">
        <h1>Макс. Уровень</h1>
        <div class="list-container" id="leaderboard-list"></div>
        <button onclick="showScreen('menu-screen')">Назад</button>
    </div>
</div>

<script>
    const CONFIG = {
        rows: 8, cols: 8, size: 0,
        colors: [ '#00f0ff', '#bd00ff', '#00ff66', '#ff9900', '#ff0055' ],
        colorNames: [ 'Синих', 'Пурпур', 'Зеленых', 'Желтых', 'Красных' ]
    };

    let state = {
        grid: [], score: 0, money: 0, level: 1, targetColor: 0, collected: 0, required: 20,
        dragStart: null, isAnimating: false, particles: [], active: false, swapAnim: null, activeItem: null
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let leaders = JSON.parse(localStorage.getItem('nc_leaders')) || [{level:1, score:500}];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'leaderboard-screen') {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            [...leaders].sort((a,b) => b.level - a.level).forEach((l, idx) => {
                list.innerHTML += `<div class="list-item"><span>${idx+1}. Уровень ${l.level}</span><span style="color:var(--neon-blue);">${l.score} Очков</span></div>`;
            });
        }
    }

    function drawCrystal(ctx, x, y, s, color, scale=1) {
        ctx.save();
        ctx.shadowColor = color; ctx.shadowBlur = 10;
        ctx.strokeStyle = color; ctx.lineWidth = 2.5;
        ctx.translate(x + s/2, y + s/2); ctx.scale(scale, scale);
        
        const r = (s - 14) / 2;
        ctx.fillStyle = color + '20';
        ctx.beginPath();
        // Отрисовка многогранного алмаза со скругленными ребрами
        ctx.moveTo(0, -r);
        ctx.lineTo(r * 0.7, -r * 0.4); ctx.lineTo(r, 0); ctx.lineTo(r * 0.7, r * 0.4);
        ctx.lineTo(0, r);
        ctx.lineTo(-r * 0.7, r * 0.4); ctx.lineTo(-r, 0); ctx.lineTo(-r * 0.7, -r * 0.4);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        
        // Внутренние грани кристалла для эффекта блеска
        ctx.strokeStyle = color + '66'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
        ctx.restore();
    }

    function startGame() {
        state.score = 0; state.money = 0; state.level = 1; state.activeItem = null;
        initLevelData();
        state.grid = []; state.particles = []; state.dragStart = null;
        state.isAnimating = false; state.swapAnim = null; state.active = true;
        updateHUD();
        showScreen('game-screen');
        setTimeout(() => { resizeCanvas(); initGrid(); requestAnimationFrame(gameLoop); }, 60);
    }

    function initLevelData() {
        state.targetColor = Math.floor(Math.random() * CONFIG.colors.length);
        state.collected = 0;
        state.required = 15 + state.level * 5; // С каждым уровнем цель увеличивается на 5 кристаллов
    }

    function updateHUD() {
        document.getElementById('hud-level').innerText = state.level;
        document.getElementById('hud-score').innerText = state.score;
        document.getElementById('hud-money').innerText = `€${state.money}`;
        document.getElementById('hud-target').innerText = `${state.collected}/${state.required}\n${CONFIG.colorNames[state.targetColor]}`;
        document.getElementById('btn-hammer').classList.toggle('selected', state.activeItem === 'hammer');
        document.getElementById('btn-bomb').classList.toggle('selected', state.activeItem === 'bomb');
    }

    function buyItem(type) {
        if(state.isAnimating) return;
        if(state.activeItem === type) { state.activeItem = null; updateHUD(); return; }
        const price = type === 'hammer' ? 150 : 300;
        if(state.money >= price) { state.activeItem = type; } else { alert('Недостаточно €!'); }
        updateHUD();
    }

    function quitGame() {
        state.active = false;
        if(state.score > 0) {
            leaders.push({ level: state.level, score: state.score });
            localStorage.setItem('nc_leaders', JSON.stringify(leaders.slice(0, 15)));
        }
        showScreen('menu-screen');
    }

    function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        const size = Math.min(container.clientWidth, container.clientHeight, 400);
        canvas.width = size; canvas.height = size;
        CONFIG.size = size / CONFIG.cols;
    }

    function initGrid() {
        for(let r=0; r<CONFIG.rows; r++) {
            state.grid[r] = [];
            for(let c=0; c<CONFIG.cols; c++) {
                let id;
                do { id = Math.floor(Math.random() * CONFIG.colors.length); } while (wouldCreateMatch(r, c, id));
                state.grid[r][c] = { id: id, animY: 0, isDropping: false };
            }
        }
    }

    function wouldCreateMatch(r, c, id) {
        if (c >= 2 && state.grid[r][c-1]?.id === id && state.grid[r][c-2]?.id === id) return true;
        if (r >= 2 && state.grid[r-1]?.[c]?.id === id && state.grid[r-2]?.[c]?.id === id) return true;
        return false;
    }

    function spawnExplosion(x, y, color) {
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2, speed = 1 + Math.random() * 3;
            state.particles.push({ x: x + CONFIG.size/2, y: y + CONFIG.size/2, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color: color });
        }
    }

    function processMatches() {
        let matchGrid = Array.from({length: CONFIG.rows}, () => Array(CONFIG.cols).fill(false));
        let found = false;

        for (let r = 0; r < CONFIG.rows; r++) {
            for (let c = 0; c < CONFIG.cols - 2; c++) {
                let id = state.grid[r][c]?.id;
                if (id !== null && id === state.grid[r][c+1]?.id && id === state.grid[r][c+2]?.id) { matchGrid[r][c] = matchGrid[r][c+1] = matchGrid[r][c+2] = true; found = true; }
            }
        }
        for (let r = 0; r < CONFIG.rows - 2; r++) {
            for (let c = 0; c < CONFIG.cols; c++) {
                let id = state.grid[r][c]?.id;
                if (id !== null && id === state.grid[r+1][c]?.id && id === state.grid[r+2][c]?.id) { matchGrid[r][c] = matchGrid[r+1][c] = matchGrid[r+2][c] = true; found = true; }
            }
        }

        if (found) {
            let count = 0;
            for (let r = 0; r < CONFIG.rows; r++) {
                for (let c = 0; c < CONFIG.cols; c++) {
                    if (matchGrid[r][c] && state.grid[r][c].id !== null) {
                        if(state.grid[r][c].id === state.targetColor) state.collected++;
                        spawnExplosion(c * CONFIG.size, r * CONFIG.size, CONFIG.colors[state.grid[r][c].id]);
                        state.grid[r][c].id = null; count++;
                    }
                }
            }
            state.score += count * 10;
            state.money += count * 5; // Зарабатываем евро за разрушения
            updateHUD();
            checkWinCondition();
        } else { state.isAnimating = false; }
    }

    function checkWinCondition() {
        if(state.collected >= state.required) {
            state.isAnimating = true;
            setTimeout(() => {
                alert(`Уровень ${state.level} Пройден! Переход на следующий уровень.`);
                state.level++;
                initLevelData();
                initGrid();
                state.isAnimating = false;
                updateHUD();
            }, 400);
        } else { applyGravity(); }
    }

    function applyGravity() {
        state.isAnimating = true;
        for (let c = 0; c < CONFIG.cols; c++) {
            let emptyRows = 0;
            for (let r = CONFIG.rows - 1; r >= 0; r--) {
                if (state.grid[r][c].id === null) { emptyRows++; }
                else if (emptyRows > 0) {
                    state.grid[r + emptyRows][c].id = state.grid[r][c].id;
                    state.grid[r + emptyRows][c].animY = -emptyRows * CONFIG.size;
                    state.grid[r + emptyRows][c].isDropping = true;
                    state.grid[r][c].id = null;
                }
            }
            for (let k = 0; k < emptyRows; k++) {
                state.grid[k][c].id = Math.floor(Math.random() * CONFIG.colors.length);
                state.grid[k][c].animY = -emptyRows * CONFIG.size;
                state.grid[k][c].isDropping = true;
            }
        }
    }

    function handleUseItem(r, c) {
        if(state.activeItem === 'hammer') {
            state.money -= 150;
            if(state.grid[r][c].id === state.targetColor) state.collected++;
            spawnExplosion(c * CONFIG.size, r * CONFIG.size, CONFIG.colors[state.grid[r][c].id]);
            state.grid[r][c].id = null;
        } else if(state.activeItem === 'bomb') {
            state.money -= 300;
            for(let i = -1; i <= 1; i++) {
                for(let j = -1; j <= 1; j++) {
                    let nr = r + i, nc = c + j;
                    if(nr >= 0 && nr < CONFIG.rows && nc >= 0 && nc < CONFIG.cols && state.grid[nr][nc].id !== null) {
                        if(state.grid[nr][nc].id === state.targetColor) state.collected++;
                        spawnExplosion(nc * CONFIG.size, nr * CONFIG.size, CONFIG.colors[state.grid[nr][nc].id]);
                        state.grid[nr][nc].id = null;
                    }
                }
            }
        }
        state.activeItem = null;
        updateHUD();
        checkWinCondition();
    }

    function pointerDown(clientX, clientY) {
        if (state.isAnimating || !state.active) return;
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((clientX - rect.left) / CONFIG.size);
        const r = Math.floor((clientY - rect.top) / CONFIG.size);
        if (r < 0 || r >= CONFIG.rows || c < 0 || c >= CONFIG.cols) return;

        if(state.activeItem) { handleUseItem(r, c); return; }
        state.dragStart = { r, c, x: clientX, y: clientY };
    }

    function pointerMove(clientX, clientY) {
        if (!state.dragStart || state.isAnimating) return;
        const dx = clientX - state.dragStart.x, dy = clientY - state.dragStart.y, minDist = CONFIG.size * 0.4;

        if (Math.abs(dx) > minDist || Math.abs(dy) > minDist) {
            let targetR = state.dragStart.r, targetC = state.dragStart.c;
            if (Math.abs(dx) > Math.abs(dy)) { targetC += dx > 0 ? 1 : -1; } else { targetR += dy > 0 ? 1 : -1; }

            if (targetR >= 0 && targetR < CONFIG.rows && targetC >= 0 && targetC < CONFIG.cols) {
                state.isAnimating = true;
                state.swapAnim = { r1: state.dragStart.r, c1: state.dragStart.c, r2: targetR, c2: targetC, t: 0, direction: 1 };
            }
            state.dragStart = null;
        }
    }

    function pointerUp() { state.dragStart = null; }
    function easeInOutQuad(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

    function update() {
        for (let i = state.particles.length - 1; i >= 0; i--) {
            let p = state.particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
            if (p.alpha <= 0) state.particles.splice(i, 1);
        }

        if (state.swapAnim) {
            let sa = state.swapAnim; sa.t += 0.08 * sa.direction;
            if (sa.t >= 1) {
                sa.t = 1;
                let temp = state.grid[sa.r1][sa.c1].id; state.grid[sa.r1][sa.c1].id = state.grid[sa.r2][sa.c2].id; state.grid[sa.r2][sa.c2].id = temp;
                if (hasAnyMatches()) { state.swapAnim = null; processMatches(); } else { sa.direction = -1; }
            } else if (sa.t <= 0) {
                let temp = state.grid[sa.r1][sa.c1].id; state.grid[sa.r1][sa.c1].id = state.grid[sa.r2][sa.c2].id; state.grid[sa.r2][sa.c2].id = temp;
                state.swapAnim = null; state.isAnimating = false;
            }
            return;
        }

        let dropping = false;
        for (let r = 0; r < CONFIG.rows; r++) {
            for (let c = 0; c < CONFIG.cols; c++) {
                let f = state.grid[r][c];
                if (f?.isDropping) { f.animY += 8; if (f.animY >= 0) { f.animY = 0; f.isDropping = false; } else { dropping = true; } }
            }
        }
        if (state.isAnimating && !dropping) processMatches();
    }

    function hasAnyMatches() {
        for (let r = 0; r < CONFIG.rows; r++) {
            for (let c = 0; c < CONFIG.cols; c++) {
                let id = state.grid[r][c].id; if (id === null) continue;
                if (c < CONFIG.cols - 2 && id === state.grid[r][c+1]?.id && id === state.grid[r][c+2]?.id) return true;
                if (r < CONFIG.rows - 2 && id === state.grid[r+1][c]?.id && id === state.grid[r+2][c]?.id) return true;
            }
        }
        return false;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)'; ctx.lineWidth = 1;
        for (let i = 0; i <= CONFIG.cols; i++) {
            ctx.beginPath(); ctx.moveTo(i * CONFIG.size, 0); ctx.lineTo(i * CONFIG.size, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i * CONFIG.size); ctx.lineTo(canvas.width, i * CONFIG.size); ctx.stroke();
        }

        for (let r = 0; r < CONFIG.rows; r++) {
            for (let c = 0; c < CONFIG.cols; c++) {
                let gem = state.grid[r][c]; if (!gem || gem.id === null) continue;
                let drawX = c * CONFIG.size, drawY = r * CONFIG.size, currentScale = 1;
                if (gem.isDropping) drawY += gem.animY;

                if (state.swapAnim) {
                    let sa = state.swapAnim, ep = easeInOutQuad(sa.t);
                    let oX = (sa.c2 - sa.c1) * CONFIG.size * ep, oY = (sa.r2 - sa.r1) * CONFIG.size * ep;
                    if (r === sa.r1 && c === sa.c1) { drawX += oX; drawY += oY; currentScale = 1 + Math.sin(sa.t * Math.PI) * 0.12; } 
                    else if (r === sa.r2 && c === sa.c2) { drawX -= oX; drawY -= oY; currentScale = 1 - Math.sin(sa.t * Math.PI) * 0.08; }
                }
                if (drawY >= -CONFIG.size / 2) drawCrystal(ctx, drawX, drawY, CONFIG.size, CONFIG.colors[gem.id], currentScale);
            }
        }

        state.particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); ctx.restore();
        });
    }

    function gameLoop() { if (!state.active) return; update(); draw(); requestAnimationFrame(gameLoop); }

    canvas.addEventListener('mousedown', (e) => pointerDown(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => pointerMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', pointerUp);
    canvas.addEventListener('touchstart', (e) => { if(e.touches.length > 0) pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
    window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) pointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('touchend', pointerUp);
    window.addEventListener('resize', () => { if(state.active) resizeCanvas(); });
</script>
</body>
</html>
        </div>
        
        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="game" class="screen">
            <div id="hud">
                <div class="row">
                    <div id="lvl-txt">Уровень: 1</div>
                    <div>Счет: <span id="score-txt">0</span></div>
                </div>
                <div class="row" style="margin:4px 0 0; color:var(--neon);"><div id="target-txt"></div></div>
                <div class="p-bar" id="progress-wrapper"><div id="p-fill" class="p-fill"></div></div>
            </div>
            <canvas id="canvas" width="320" height="320"></canvas>
            <button class="btn" style="margin-top:12px; width:50%; padding:8px; font-size:13px;" onclick="backToMenu()">В меню</button>
        </div>

        <!-- ТАБЛИЦА РЕКОРДОВ -->
        <div id="records-screen" class="screen">
            <h1>ТАБЛИЦА РЕКОРДОВ</h1>
            <div class="leaderboard" id="leaderboard-list"></div>
            <button class="btn" onclick="showScreen('menu')">Назад</button>
        </div>

        <!-- ЗАПИСЬ РЕКОРДА -->
        <div id="save-screen" class="screen">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p style="font-size:16px; margin: 0 0 10px;">Ваш счет: <span id="final-score" style="color:var(--neon); font-weight:bold;">0</span></p>
            <div class="save-box">
                <input type="text" id="player-name" placeholder="Ваше имя" maxlength="12">
                <button class="btn" style="width:100%; margin: 6px 0 0;" onclick="saveScore()">Записать рекорд</button>
            </div>
            <button class="btn" style="background:#16213e; margin-top: 4px;" onclick="showScreen('menu')">Пропустить</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d'), W = 8, S = 40;
        let board = [], score = 0, lvl = 1, tColor = 0, tAmt = 15, collected = 0, lock = false, drag = null, anims = [], loopActive = false;
        let lastMove = null, isInfiniteMode = false;
        const colors = ['#ff4757', '#00ff88', '#00f3ff', '#ffaa00', '#b537ff'], names = ["Рубины", "Изумруды", "Сапфиры", "Янтарь", "Аметисты"];

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        function startGame(col, isInfinite) {
            tColor = col; isInfiniteMode = isInfinite; lvl = 1; tAmt = 15; score = 0; collected = 0; lock = false; board = []; anims = []; lastMove = null;
            document.getElementById('progress-wrapper').style.display = isInfiniteMode ? 'none' : 'block';
            for(let r=0; r<W; r++) {
                board[r] = []; for(let c=0; c<W; c++) {
                    let cl; do { cl = Math.floor(Math.random()*5); } while((c>=2 && board[r][c-1]==cl && board[r][c-2]==cl) || (r>=2 && board[r-1][c]==cl && board[r-2][c]==cl));
                    board[r][c] = cl;
                }
            }
            updateHUD(); showScreen('game'); if(!loopActive) { loopActive = true; drawLoop(); }
        }
        
        function updateHUD() {
            document.getElementById('score-txt').innerText = score;
            document.getElementById('lvl-txt').innerText = isInfiniteMode ? "Режим: Дзен" : `Уровень: ${lvl}`;
            document.getElementById('target-txt').innerText = isInfiniteMode ? "Собирайте любые комбинации!" : `Цель (${names[tColor]}): ${collected} / ${tAmt}`;
            document.getElementById('p-fill').style.width = isInfiniteMode ? '0%' : `${Math.min((collected/tAmt)*100, 100)}%`;
        }
        
        function backToMenu() { loopActive = false; document.getElementById('final-score').innerText = score; showScreen('save-screen'); }

        function draw() {
            ctx.clearRect(0,0,320,320);
            for(let r=0; r<W; r++) {
                for(let c=0; c<W; c++) {
                    if(board[r][c] === null) continue;
                    let drawX = c*S, drawY = r*S, scale = 1, alpha = 1;
                    let a = anims.find(x => x.r === r && x.c === c);
                    if(a) { drawX = a.x; drawY = a.y; scale = a.scale; alpha = a.alpha; }
                    if(alpha <= 0) continue;
                    ctx.save(); ctx.globalAlpha = alpha; ctx.translate(drawX+S/2, drawY+S/2); ctx.scale(scale, scale);
                    ctx.fillStyle = colors[board[r][c]]; ctx.shadowBlur = 8; ctx.shadowColor = colors[board[r][c]];
                    ctx.beginPath(); ctx.moveTo(0, -S/2.4); ctx.lineTo(S/2.4, 0); ctx.lineTo(0, S/2.4); ctx.lineTo(-S/2.4, 0); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.moveTo(0, -S/2.4); ctx.lineTo(S/4.5, -S/4.5); ctx.lineTo(0, 0); ctx.lineTo(-S/4.5, -S/4.5); ctx.closePath(); ctx.fill();
                    ctx.restore();
                }
            }
        }
        
        function drawLoop() { if(!loopActive) return; updateAnims(); draw(); requestAnimationFrame(drawLoop); }

        function updateAnims() {
            let done = true, hasDestroy = false, hasMove = false;
            anims.forEach(a => {
                let tx = a.tc*S, ty = a.tr*S;
                if(a.type === 'move') {
                    hasMove = true;
                    let dx = tx - a.x, dy = ty - a.y;
                    if(Math.abs(dx)>0.5) { a.x += dx*0.3; done = false; } else a.x = tx;
                    if(Math.abs(dy)>0.5) { a.y += dy*0.3; done = false; } else a.y = ty;
                } else if(a.type === 'destroy') {
                    hasDestroy = true;
                    if(a.scale > 0.1) { a.scale -= 0.15; a.alpha -= 0.15; done = false; } else { a.scale = 0; a.alpha = 0; }
                }
            });
            if(done && anims.length > 0) { 
                anims = []; 
                if(hasDestroy) dropGems(); 
                else if(hasMove) { if(lastMove) checkAfterMove(); else { let m = findMatches(); if(m.length > 0) clearMatches(m); else lock = false; } }
            }
        }

        function getXY(e) {
            let rect = cvs.getBoundingClientRect(), scaleX = 320/rect.width, scaleY = 320/rect.height;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { c: Math.floor((clientX - rect.left)*scaleX/S), r: Math.floor((clientY - rect.top)*scaleY/S), x: clientX, y: clientY };
        }
        cvs.addEventListener('mousedown', e => { if(!lock) drag = getXY(e); });
        cvs.addEventListener('touchstart', e => { if(!lock) drag = getXY(e); }, {passive:true});
        
        function handleMove(clientX, clientY) {
            if(!drag) return;
            let dX = clientX - drag.x, dY = clientY - drag.y;
            if(Math.abs(dX) > 20 || Math.abs(dY) > 20) {
                let tr = drag.r, tc = drag.c;
                if(Math.abs(dX) > Math.abs(dY)) tc += dX > 0 ? 1 : -1; else tr += dY > 0 ? 1 : -1;
                if(tr>=0 && tr<W && tc>=0 && tc<W && (Math.abs(drag.r-tr)+Math.abs(drag.c-tc)===1)) {
                    lock = true; lastMove = { r1: drag.r, c1: drag.c, r2: tr, c2: tc };
                    anims.push({r:tr, c:tc, x:drag.c*S, y:drag.r*S, tr:tr, tc:tc, type:'move', scale:1, alpha:1});
                    anims.push({r:drag.r, c:drag.c, x:tc*S, y:tr*S, tr:drag.r, tc:drag.c, type:'move', scale:1, alpha:1});
                    swap(drag.r, drag.c, tr, tc);
                }
                drag = null;
            }
        }
        window.addEventListener('mousemove', e => { if(drag) handleMove(e.clientX, e.clientY); });
        window.addEventListener('touchmove', e => { if(drag && e.touches.length) handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('mouseup', () => drag = null); window.addEventListener('touchend', () => drag = null);

        function swap(r1,c1,r2,c2) { let t=board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=t; }
        
        function checkAfterMove() {
            let m = findMatches();
            if(m.length > 0) { lastMove = null; clearMatches(m); } 
            else {
                let lm = lastMove; lastMove = null; swap(lm.r1, lm.c1, lm.r2, lm.c2);
                anims.push({r:lm.r2, c:lm.c2, x:lm.c1*S, y:lm.r1*S, tr:lm.r2, tc:lm.c2, type:'move', scale:1, alpha:1});
                anims.push({r:lm.r1, c:lm.c1, x:lm.c2*S, y:lm.r2*S, tr:lm.r1, tc:lm.c1, type:'move', scale:1, alpha:1});
            }
        }

        function findMatches() {
            let m = Array.from({length:W}, () => Array(W).fill(false)), found = [];
            for(let r=0; r<W; r++) for(let c=0; c<W-2; c++) { let cl=board[r][c]; if(cl!==null && cl==board[r][c+1] && cl==board[r][c+2]) m[r][c]=m[r][c+1]=m[r][c+2]=true; }
            for(let c=0; c<W; c++) for(let r=0; r<W-2; r++) { let cl=board[r][c]; if(cl!==null && cl==board[r+1][c] && cl==board[r+2][c]) m[r][c]=m[r+1][c]=m[r+2][c]=true; }
            for(let r=0; r<W; r++) for(let c=0; c<W; c++) if(m[r][c]) found.push({r, c});
            return found;
        }

        function clearMatches(m) {
            m.forEach(({r,c}) => {
                if(board[r][c]!==null) { 
                    if(board[r][c]===tColor || isInfiniteMode) collected++; score+=10; 
                    anims.push({r,c,x:c*S,y:r*S,scale:1,alpha:1,type:'destroy'}); board[r][c] = null;
                }
            });
            updateHUD();
        }

        function dropGems() {
            for(let c=0; c<W; c++) {
                let spaces = 0;
                for(let r=W-1; r >= 0; r--) {
                    if(board[r][c] === null) spaces++;
                    else if(spaces > 0) {
                        let tR = r + spaces; board[tR][c] = board[r][c]; board[r][c] = null;
                        anims.push({r:tR, c:c, x:c*S, y:r*S, tr:tR, tc:c, type:'move', scale:1, alpha:1});
                    }
                }
                for(let i=0; i<spaces; i++) {
                    let tR = spaces-1-i, cl = Math.floor(Math.random()*5); board[tR][c] = cl;
                    anims.push({r:tR, c:c, x:c*S, y:-(i+1)*S, tr:tR, tc:c, type:'move', scale:1, alpha:1});
                }
            }
            if(anims.length === 0) { lock = false; checkLvl(); }
        }

        function checkLvl() {
            if(!isInfiniteMode && collected >= tAmt) { lvl++; collected = 0; tAmt = Math.floor(tAmt*1.3)+5; }
            updateHUD(); let m = findMatches(); if(m.length>0) clearMatches(m); else lock = false;
        }

        function showLeaderboardScreen() {
            const list = document.getElementById('leaderboard-list'); list.innerHTML = '';
            let records = JSON.parse(localStorage.getItem('neon_records')) || [];
            if(records.length === 0) list.innerHTML = '<div style="text-align:center; padding:10px; opacity:0.5;">Нет рекордов</div>';
            records.forEach((r, idx) => {
                list.innerHTML += `<div class="leader-item"><span>${idx+1}. ${r.name}</span><span style="color:var(--neon); font-weight:bold;">${r.score}</span></div>`;
            });
            showScreen('records-screen');
        }

        function saveScore() {
            let name = document.getElementById('player-name').value.trim() || "Аноним";
            let records = JSON.parse(localStorage.getItem('neon_records')) || [];
            records.push({ name: name, score: score });
            records.sort((a,b) => b.score - a.score);
            records = records.slice(0, 10);
            localStorage.setItem('neon_records', JSON.stringify(records));
            document.getElementById('player-name').value = '';
            showLeaderboardScreen();
        }
    </script>
</body>
</html>
