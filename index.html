<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интересный тест или игра</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #intro {
            text-align: center;
            cursor: pointer;
            padding: 20px;
            border: 2px solid #333;
            background: white;
        }
        #screamer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
        }
        #screamer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Начальный экран для обхода блокировки автозвука браузерами -->
    <div id="intro" onclick="startScreamer()">
        <h2>Пройти тест на внимательность</h2>
        <p>Нажмите сюда, чтобы начать...</p>
    </div>

    <!-- Элементы скримера -->
    <div id="screamer">
        <img src="scare.jpg" alt="BOO!">
        <audio id="screamSound" src="scream.mp3" preload="auto"></audio>
    </div>

    <script>
        function startScreamer() {
            // Скрываем кнопку запуска
            document.getElementById('intro').style.display = 'none';
            
            // Включаем полноэкранный режим для максимального эффекта
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            
            // Задержка перед испугом (3000 миллисекунд = 3 секунды)
            setTimeout(function() {
                // Показываем страшную картинку
                document.getElementById('screamer').style.display = 'block';
                
                // Включаем звук крика
                let sound = document.getElementById('screamSound');
                sound.volume = 1.0; // Максимальная громкость
                sound.play();
            }, 3000); 
        }
    </script>

</body>
</html>
