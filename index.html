<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Shift: Infinity</title>
    <style>
        :root { --bg: #14151b; --panel: #1e202b; --text: #f0f1f5; --accent: #5c8ae6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app { width: 340px; height: 100vh; max-height: 680px; display: flex; flex-direction: column; background: var(--panel); position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; justify-content: center; align-items: center; position: absolute; width: 100%; top: 0; left: 0; background: var(--bg); }
        .screen.active { display: flex; }
        h1 { font-size: 1.6rem; color: var(--accent); margin-bottom: 15px; font-weight: bold; text-align: center; }
        button, input { background: #252839; border: 1px solid #3b3f57; color: #fff; padding: 11px; font-size: 0.95rem; border-radius: 8px; cursor: pointer; margin: 5px 0; width: 90%; text-align: center; outline: none; }
        button:active { background: var(--accent); }
        input { background: #14151b; cursor: text; user-select: text; }
        .hud { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); padding: 8px 5px; background: rgba(0,0,0,0.3); font-size: 0.7rem; text-align: center; border-bottom: 2px solid #252839; }
        .hud div { font-weight: bold; display: flex; flex-direction: column; }
        #canvas-container { width: 320px; height: 320px; margin: 10px auto; position: relative; border-radius: 8px; overflow: hidden; background: #0b0c10; }
        canvas { display: block; touch-action: none; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 92%; margin: 5px auto; }
        .inv-btn { font-size: 0.7rem; padding: 8px 2px; margin: 0; background: #1e202b; position: relative; }
        .inv-btn.active-item { border-color: var(--accent); background: #2d3145; }
        .badge { position: absolute; top: -5px; right: -3px; background: #e65c5c; color: #fff; font-size: 0.65rem; padding: 1px 5px; border-radius: 10px; font-weight: bold; }
        .list-box { width: 90%; max-height: 200px; overflow-y: auto; background: #1e202b; border-radius: 8px; padding: 5px; margin-bottom: 15px; }
        .list-item { display: flex; justify-content: space-between; padding: 8px; font-size: 0.85rem; border-bottom: 1px solid #252839; }
        .toggle-container { display: flex; justify-content: space-between; width: 90%; align-items: center; margin: 8px 0; font-size: 0.95rem; }
        #fps-counter { position: absolute; top: 5px; left: 5px; font-size: 10px; color: #555; display: none; z-index: 10; }
    </style>
</head>
<body>
<div id="app">
    <div id="fps-counter">FPS: 0</div>
    <!-- РЕГИСТРАЦИЯ -->
    <div id="reg-screen" class="screen active">
        <h1>РЕГИСТРАЦИЯ</h1>
        <input type="text" id="username" placeholder="Имя игрока" maxlength="12">
        <button onclick="register()">Войти</button>
    </div>
    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen">
        <h1 id="welcome-text">ПРИВЕТ</h1>
        <div style="font-size:0.9rem; margin-bottom:10px; color:#7fcf93;">Баланс: <span id="menu-money">€100</span></div>
        <button onclick="startGame('campaign')">Обычный режим</button>
        <button onclick="startGame('zen')">Режим Дзен</button>
        <button onclick="showShop()">Магазин плюшек</button>
        <button onclick="showLeaderboard()">Рекорды</button>
        <button onclick="showScreen('settings-screen')">Настройки</button>
    </div>
    <!-- МАГАЗИН -->
    <div id="shop-screen" class="screen">
        <h1>МАГАЗИН ПЛЮШЕК</h1>
        <div style="font-size:0.9rem; margin-bottom:10px; color:#7fcf93;">Ваш кошелек: <span id="shop-money">€100</span></div>
        <div class="list-box" style="max-height:260px;">
            <div class="list-item"><span>🔨 Молот (€40)</span><button style="width:70px; padding:4px; margin:0;" onclick="buyItem('hammer', 40)">Купить</button></div>
            <div class="list-item"><span>💣 Бомба (€80)</span><button style="width:70px; padding:4px; margin:0;" onclick="buyItem('bomb', 80)">Купить</button></div>
            <div class="list-item"><span>⚡ Крест (€120)</span><button style="width:70px; padding:4px; margin:0;" onclick="buyItem('cross', 120)">Купить</button></div>
            <div class="list-item"><span>🎨 Сброс (€150)</span><button style="width:70px; padding:4px; margin:0;" onclick="buyItem('color', 150)">Купить</button></div>
        </div>
        <button onclick="exitShop()">Назад в меню</button>
    </div>
    <!-- НАСТРОЙКИ -->
    <div id="settings-screen" class="screen">
        <h1>НАСТРОЙКИ</h1>
        <div class="toggle-container"><span>Показывать FPS</span><input type="checkbox" id="fps-toggle" onchange="toggleFPS()" style="width:30px; margin:0;"></div>
        <div class="toggle-container"><span style="color:#ff5ce6; font-weight:bold;">🤪 Режим наркомана</span><input type="checkbox" id="acid-toggle" onchange="toggleAcid()" style="width:30px; margin:0;"></div>
        <button onclick="showScreen('menu-screen')">Назад</button>
    </div>
    <!-- РЕКОРДЫ -->
    <div id="leaderboard-screen" class="screen">
        <h1>ТОП РЕКОРДОВ</h1>
        <div class="list-box" id="leader-list"></div>
        <button onclick="showScreen('menu-screen')">Назад</button>
    </div>
    <!-- ИГРА -->
    <div id="game-screen" class="screen" style="padding:0;">
        <div class="hud">
            <div>Уровень<span id="hud-mode" style="color:var(--accent);">-</span></div>
            <div>Очки/Ходы<span id="hud-score">0 / 0</span></div>
            <div>Баланс<span id="hud-money" style="color:#7fcf93;">€0</span></div>
            <div>Цель<span id="hud-target">-</span></div>
        </div>
        <div id="canvas-container"><canvas id="gameCanvas" width="320" height="320"></canvas></div>
        <div class="inv-grid">
            <button id="btn-inv-hammer" class="inv-btn" onclick="selectTool('hammer')">🔨 Молот<span class="badge" id="count-hammer">0</span></button>
            <button id="btn-inv-bomb" class="inv-btn" onclick="selectTool('bomb')">💣 Бомба<span class="badge" id="count-bomb">0</span></button>
            <button id="btn-inv-cross" class="inv-btn" onclick="selectTool('cross')">⚡ Крест<span class="badge" id="count-cross">0</span></button>
            <button id="btn-inv-color" class="inv-btn" onclick="selectTool('color')">🎨 Сброс<span class="badge" id="count-color">0</span></button>
        </div>
        <button onclick="quitGame()" style="width:40%; padding: 5px; font-size:0.75rem; margin: 3px auto;">Выход в меню</button>
    </div>
</div>
<script>
    const CONFIG = { rows: 8, cols: 8, colors: [ '#4facfe', '#43e97b', '#b180f0', '#fa709a', '#ffee75' ], colorNames: [ 'Синих', 'Зеленых', 'Лиловых', 'Розовых', 'Желтых' ] };
    let state = { grid: [], score: 0, money: 100, level: 1, targetColor: 0, collected: 0, required: 15, moves: 25, dragStart: null, isAnimating: false, particles: [], shockwaves: [], active: false, mode: 'campaign', activeItem: null, user: 'Игрок', showFps: false, winAnimTimer: 0, textAlpha: 0, overlayAlpha: 0, inventory: { hammer: 2, bomb: 1, cross: 0, color: 0 }, acidMode: false, globalTime: 0, combo: 1, comboTexts: [] };
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    let lastTime = performance.now(), frameCount = 0, fps = 0;

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function register() { const name = document.getElementById('username').value.trim(); state.user = name || 'Игрок'; document.getElementById('welcome-text').innerText = `ПРИВЕТ, ${state.user.toUpperCase()}!`; updateMenuStats(); showScreen('menu-screen'); }
    function updateMenuStats() { if(document.getElementById('menu-money')) document.getElementById('menu-money').innerText = `€${state.money}`; if(document.getElementById('shop-money')) document.getElementById('shop-money').innerText = `€${state.money}`; }
    function showShop() { updateMenuStats(); showScreen('shop-screen'); }
    function exitShop() { showScreen('menu-screen'); }
    function toggleFPS() { state.showFps = document.getElementById('fps-toggle').checked; document.getElementById('fps-counter').style.display = state.showFps ? 'block' : 'none'; }
    function toggleAcid() { state.acidMode = document.getElementById('acid-toggle').checked; }
    function buyItem(type, price) { if(state.money >= price) { state.money -= price; state.inventory[type]++; updateMenuStats(); } else { alert('Недостаточно евро!'); } }

    function showLeaderboard() {
        const list = document.getElementById('leader-list'); list.innerHTML = '';
        const records = JSON.parse(localStorage.getItem('neon_records')) || [];
        if(records.length === 0) list.innerHTML = '<div class="list-item" style="justify-content:center;">Нет рекордов</div>';
        records.forEach((r, i) => { list.innerHTML += `<div class="list-item"><span>${i+1}. ${r.name}</span><span style="color:var(--accent);">${r.score} Очков (Ур.${r.lvl})</span></div>`; });
        showScreen('leaderboard-screen');
    }

    function saveRecord() {
        let records = JSON.parse(localStorage.getItem('neon_records')) || [];
        records.push({ name: state.user, score: state.score, lvl: state.level });
        records.sort((a, b) => b.score - a.score);
        localStorage.setItem('neon_records', JSON.stringify(records.slice(0, 5)));
    }

    function drawCrystal(ctx, x, y, color, alpha=1, isLightning=false) {
        ctx.save(); ctx.translate(x + 20, y + 20); ctx.globalAlpha = alpha;
        if (state.acidMode) { ctx.rotate(state.globalTime * 0.05 + (x + y) * 0.01); let scale = 1 + Math.sin(state.globalTime * 0.1 + x) * 0.15; ctx.scale(scale, scale); }
        const r = 8, w = 34, h = 34;
        ctx.fillStyle = color; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-w/2 + r, -h/2); ctx.arcTo(w/2, -h/2, w/2, h/2, r); ctx.arcTo(w/2, h/2, -w/2, h/2, r); ctx.arcTo(-w/2, h/2, -w/2, -h/2, r); ctx.arcTo(-w/2, -h/2, w/2, -h/2, r); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.ellipse(-5, -5, 5, 2.5, Math.PI/4, 0, Math.PI*2); ctx.fill();
        
        if (isLightning) {
            ctx.save(); let wave = 1.1 + Math.sin(state.globalTime * 0.2) * 0.15; ctx.scale(wave, wave);
            ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.shadowColor = color; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(-3, -12); ctx.lineTo(5, -2); ctx.lineTo(0, 0); ctx.lineTo(4, 12); ctx.lineTo(-5, 2); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    }

    function startGame(mode) {
        state.mode = mode; state.score = 0; state.level = 1; state.activeItem = null; state.winAnimTimer = 0; state.combo = 1; state.comboTexts = [];
        initLevelData(); initGrid(); state.particles = []; state.shockwaves = []; state.dragStart = null; state.isAnimating = false; state.active = true;
        updateHUD(); showScreen('game-screen');
    }

    function initLevelData() { state.targetColor = Math.floor(Math.random() * CONFIG.colors.length); state.collected = 0; state.required = 10 + state.level * 5; state.moves = Math.max(15, 35 - state.level * 2); }
    
    function updateHUD() {
        document.getElementById('hud-mode').innerText = state.mode === 'zen' ? 'Дзен' : `Ур. ${state.level}`;
        document.getElementById('hud-score').innerText = state.mode === 'zen' ? state.score : `${state.score} / ⏳${state.moves}`;
        document.getElementById('hud-money').innerText = `€${state.money}`;
        document.getElementById('hud-target').innerText = state.mode === 'zen' ? '∞' : `${state.collected}/${state.required} ${CONFIG.colorNames[state.targetColor]}`;
        ['hammer','bomb','cross','color'].forEach(t => { document.getElementById(`count-${t}`).innerText = state.inventory[t]; document.getElementById(`btn-inv-${t}`).classList.toggle('active-item', state.activeItem === t); });
    }

    function selectTool(type) { if(state.isAnimating || state.winAnimTimer > 0) return; if(state.activeItem === type) { state.activeItem = null; updateHUD(); return; } if(state.inventory[type] > 0) { state.activeItem = type; } else { alert('Купите в магазине меню!'); } updateHUD(); }

    function initGrid() {
        for(let r=0; r<CONFIG.rows; r++) { state.grid[r] = []; for(let c=0; c<CONFIG.cols; c++) { do { state.grid[r][c] = { colorId: Math.floor(Math.random() * CONFIG.colors.length), x: c*40, y: r*40, alpha: 1, isDestroying: false, isLightning: false }; } while (hasMatchAt(r, c)); } }
    }

    function hasMatchAt(r, c) {
        const id = state.grid[r][c].colorId;
        if(c >= 2 && state.grid[r][c-1]?.colorId === id && state.grid[r][c-2]?.colorId === id) return true;
        if(r >= 2 && state.grid[r-1]?.[c]?.colorId === id && state.grid[r-2]?.[c]?.colorId === id) return true;
        return false;
    }

    function getGridCoords(clientX, clientY) { const rect = canvas.getBoundingClientRect(); return { c: Math.floor((clientX - rect.left) / 40), r: Math.floor((clientY - rect.top) / 40) }; }

    function handleInputStart(clientX, clientY) { if(!state.active || state.isAnimating || state.winAnimTimer > 0) return; const coords = getGridCoords(clientX, clientY); if(coords.r >= 0 && coords.r < CONFIG.rows && coords.c >= 0 && coords.c < CONFIG.cols) { if(state.activeItem) { useTool(coords.r, coords.c); } else { state.dragStart = coords; } } }
    function handleInputMove(clientX, clientY) {
        if(!state.dragStart || state.isAnimating || state.winAnimTimer > 0) return; const coords = getGridCoords(clientX, clientY); if(coords.r < 0 || coords.r >= CONFIG.rows || coords.c < 0 || coords.c >= CONFIG.cols) return;
        const dr = coords.r - state.dragStart.r, dc = coords.c - state.dragStart.c;
        if(Math.abs(dr) + Math.abs(dc) === 1) { if(state.mode === 'campaign') state.moves--; state.combo = 1; executeSwap(state.dragStart.r, state.dragStart.c, coords.r, coords.c); state.dragStart = null; }
    }

    function useTool(r, c) {
        state.isAnimating = true; const m = []; state.inventory[state.activeItem]--; state.combo = 1;
        if(state.activeItem === 'hammer') { m.push({r, c}); } 
        else if(state.activeItem === 'bomb') { for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) if(state.grid[r+i]?.[c+j]) m.push({r:r+i, c:c+j}); } 
        else if(state.activeItem === 'cross') { for(let i=0; i<8; i++) { if(state.grid[r][i]) m.push({r, c:i}); if(state.grid[i][c]) m.push({r:i, c}); } } 
        else if(state.activeItem === 'color') { const tid = state.grid[r][c]?.colorId; for(let i=0; i<8; i++) for(let j=0; j<8; j++) if(state.grid[i][j]?.colorId === tid) m.push({r:i, c:j}); }
        state.activeItem = null; processMatches(m);
    }

    function executeSwap(r1, c1, r2, c2) {
        state.isAnimating = true; const temp = state.grid[r1][c1]; state.grid[r1][c1] = state.grid[r2][c2]; state.grid[r2][c2] = temp;
        state.grid[r1][c1].x = c2*40; state.grid[r1][c1].y = r2*40; state.grid[r2][c2].x = c1*40; state.grid[r2][c2].y = r1*40;
        setTimeout(() => { if(!checkMatches()) { const t = state.grid[r1][c1]; state.grid[r1][c1] = state.grid[r2][c2]; state.grid[r2][c2] = t; state.grid[r1][c1].x = c1*40; state.grid[r1][c1].y = r1*40; state.grid[r2][c2].x = c2*40; state.grid[r2][c2].y = r2*40; state.isAnimating = false; } }, 150);
    }

    function checkMatches() {
        const m = []; const matchGrid = Array(CONFIG.rows).fill().map(() => Array(CONFIG.cols).fill(false)); const specialSpawn = [];
        for(let r=0; r<CONFIG.rows; r++) {
            let matchLen = 1;
            for(let c=0; c<CONFIG.cols; c++) {
                let checkNext = (c < CONFIG.cols - 1) && state.grid[r][c]?.colorId === state.grid[r][c+1]?.colorId && !state.grid[r][c]?.isDestroying && !state.grid[r][c+1]?.isDestroying;
                if(checkNext) { matchLen++; } else { if(matchLen >= 3) { for(let i=c-matchLen+1; i<=c; i++) matchGrid[r][i] = true; if(matchLen >= 4) specialSpawn.push({r, c: c - Math.floor(matchLen/2), colorId: state.grid[r][c].colorId}); } matchLen = 1; }
            }
        }
        for(let c=0; c<CONFIG.cols; c++) {
            let matchLen = 1;
            for(let r=0; r<CONFIG.rows; r++) {
                let checkNext = (r < CONFIG.rows - 1) && state.grid[r][c]?.colorId === state.grid[r+1][c]?.colorId && !state.grid[r][c]?.isDestroying && !state.grid[r+1][c]?.isDestroying;
                if(checkNext) { matchLen++; } else { if(matchLen >= 3) { for(let i=r-matchLen+1; i<=r; i++) matchGrid[i][c] = true; if(matchLen >= 4) specialSpawn.push({r: r - Math.floor(matchLen/2), c, colorId: state.grid[r][c].colorId}); } matchLen = 1; }
            }
        }
        for(let r=0; r<CONFIG.rows; r++) for(let c=0; c<CONFIG.cols; c++) {
            if(matchGrid[r][c]) { m.push({r, c}); if (state.grid[r][c]?.isLightning) { for(let i=0; i<8; i++) { if(!matchGrid[r][i]) m.push({r, c: i}); if(!matchGrid[i][c]) m.push({r: i, c}); } } }
        }
        if(m.length > 0) { processMatches(m, specialSpawn); return true; }
        return false;
    }

    function processMatches(matches, specialSpawn=[]) {
        state.isAnimating = true; matches.forEach(({r, c}) => { if(state.grid[r][c]) state.grid[r][c].isDestroying = true; });
        if (state.combo > 1 && matches.length > 0) { let mid = matches[Math.floor(matches.length / 2)]; state.comboTexts.push({ x: mid.c * 40 + 20, y: mid.r * 40, text: `Combo x${state.combo}`, alpha: 1 }); }
        setTimeout(() => {
            matches.forEach(({r, c}) => {
                const cry = state.grid[r][c]; if(!cry) return;
                state.shockwaves.push({ x: c*40+20, y: r*40+20, rad: 5, maxRad: 25, alpha: 1, color: CONFIG.colors[cry.colorId] });
                for(let i=0; i<12; i++) state.particles.push({ x: c*40+20, y: r*40+20, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, alpha: 1, size: Math.random()*3+2, color: CONFIG.colors[cry.colorId] });
                state.score += 10 * state.combo; if (state.globalTime % 2 === 0) state.money += 1; if(state.mode === 'campaign' && cry.colorId === state.targetColor) state.collected++; state.grid[r][c] = null;
            });
            specialSpawn.forEach(s => { state.grid[s.r][s.c] = { colorId: s.colorId, x: s.c*40, y: s.r*40, alpha: 1, isDestroying: false, isLightning: true }; });
            updateHUD(); if(state.mode === 'campaign' && state.collected >= state.required) { triggerWinAnimation(); } else { dropCrystals(); }
        }, 200);
    }

    function triggerWinAnimation() { state.winAnimTimer = 180; state.isAnimating = false; state.textAlpha = 0; state.overlayAlpha = 0; }

    function dropCrystals() {
        for(let c=0; c<CONFIG.cols; c++) {
            let emptySpaces = 0;
            for(let r=CONFIG.rows-1; r>=0; r--) { if(!state.grid[r][c]) { emptySpaces++; } else if(emptySpaces > 0) { state.grid[r+emptySpaces][c] = state.grid[r][c]; state.grid[r][c] = null; } }
            for(let i=0; i<emptySpaces; i++) state.grid[emptySpaces-1-i][c] = { colorId: Math.floor(Math.random() * CONFIG.colors.length), x: c*40, y: -40 * (i+1), alpha: 1, isDestroying: false, isLightning: false };
        }
        setTimeout(() => { if(state.mode === 'campaign' && state.moves <= 0) { alert("Ходы закончились!"); quitGame(); } else { if (checkMatches()) { state.combo++; } else { state.isAnimating = false; state.combo = 1; } } }, 250);
    }

    function quitGame() { state.active = false; saveRecord(); showScreen('menu-screen'); }

    function updateAnims() {
        state.globalTime++;
        if (state.winAnimTimer > 0) {
            state.winAnimTimer--; if (state.winAnimTimer > 150) { state.textAlpha += 0.033; state.overlayAlpha += 0.023; }
            if (state.winAnimTimer < 30) { state.textAlpha -= 0.033; state.overlayAlpha -= 0.023; for(let r=0; r<CONFIG.rows; r++) for(let c=0; c<CONFIG.cols; c++) if(state.grid[r][c]) state.grid[r][c].alpha = state.winAnimTimer / 30; }
            if (state.winAnimTimer % 15 === 0 && state.winAnimTimer > 20) { const color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)]; for(let i=0; i<20; i++) state.particles.push({ x: 160, y: 160, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, alpha: 1, size: Math.random()*4+2, color: color }); }
            if (state.winAnimTimer === 0) { state.level++; initLevelData(); initGrid(); updateHUD(); }
        }
        for(let r=0; r<CONFIG.rows; r++) { for(let c=0; c<CONFIG.cols; c++) { const cry = state.grid[r][c]; if(!cry) continue; const tx = c * 40, ty = r * 40; if(cry.x !== tx) cry.x += Math.sign(tx - cry.x) * Math.min(6, Math.abs(tx - cry.x)); if(cry.y !== ty) cry.y += Math.sign(ty - cry.y) * Math.min(6, Math.abs(ty - cry.y)); if(cry.isDestroying && cry.alpha > 0) cry.alpha -= 0.15; } }
        for(let i=state.particles.length-1; i>=0; i--) { const p = state.particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.03; if(p.alpha <= 0) state.particles.splice(i, 1); }
        for(let i=state.shockwaves.length-1; i>=0; i--) { const sw = state.shockwaves[i]; sw.rad += 2; sw.alpha -= 0.05; if(sw.alpha <= 0) state.shockwaves.splice(i, 1); }
        for(let i=state.comboTexts.length-1; i>=0; i--) { const ct = state.comboTexts[i]; ct.y -= 0.6; ct.alpha -= 0.02; if(ct.alpha <= 0) state.comboTexts.splice(i, 1); }
    }

    function gameLoop() {
        if(state.active) {
            updateAnims(); if (state.acidMode) { ctx.fillStyle = `hsl(${(state.globalTime * 2) % 360}, 25%, 8%)`; ctx.fillRect(0, 0, canvas.width, canvas.height); } else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
            for(let r=0; r<CONFIG.rows; r++) for(let c=0; c<CONFIG.cols; c++) { const cry = state.grid[r][c]; if(cry) drawCrystal(ctx, cry.x, cry.y, CONFIG.colors[cry.colorId], cry.alpha, cry.isLightning); }
            ctx.save(); for(let i=0; i<state.shockwaves.length; i++) { const sw = state.shockwaves[i]; ctx.globalAlpha = sw.alpha; ctx.strokeStyle = sw.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.rad, 0, Math.PI*2); ctx.stroke(); }
            for(let i=0; i<state.particles.length; i++) { const p = state.particles[i]; ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); }
            ctx.textAlign = 'center'; ctx.font = 'bold 13px sans-serif'; for(let i=0; i<state.comboTexts.length; i++) { const ct = state.comboTexts[i]; ctx.globalAlpha = ct.alpha; ctx.fillStyle = '#ffcc00'; ctx.fillText(ct.text, ct.x, ct.y); } ctx.restore();
            if (state.winAnimTimer > 0) { ctx.save(); ctx.fillStyle = `rgba(22, 23, 30, ${Math.max(0, Math.min(0.75, state.overlayAlpha))})`; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = Math.max(0, Math.min(1, state.textAlpha)); ctx.fillStyle = '#5c8ae6'; ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('LEVEL UP!', 160, 150); ctx.font = '14px sans-serif'; ctx.fillStyle = '#fff'; ctx.fillText('Готовим новый уровень...', 160, 185); ctx.restore(); }
        }
        if(state.showFps) { frameCount++; let now = performance.now(); if (now - lastTime >= 1000) { fps = frameCount; frameCount = 0; lastTime = now; document.getElementById('fps-counter').innerText = `FPS: ${fps}`; } }
        requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY)); canvas.addEventListener('mousemove', e => handleInputMove(e.clientX, e.clientY)); canvas.addEventListener('mouseup', () => state.dragStart = null);
    canvas.addEventListener('touchstart', e => { const t = e.touches[0]; handleInputStart(t.clientX, t.clientY); }, {passive:true}); canvas.addEventListener('touchmove', e => { const t = e.touches[0]; handleInputMove(t.clientX, t.clientY); }, {passive:true}); canvas.addEventListener('touchend', () => state.dragStart = null);
    requestAnimationFrame(gameLoop);
</script>
