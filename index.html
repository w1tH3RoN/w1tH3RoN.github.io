<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Защита Башни</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; background: #0a0a16; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { border: 2px solid #00ffcc; background: #0d1117; box-shadow: 0 0 30px rgba(0,255,204,.3); max-width: 100vw; max-height: 75vw; touch-action: none; display: block; }
        #ui { margin-bottom: 10px; font-size: 22px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,255,204,.5); display: flex; gap: 20px; }
        #btn-container { display: flex; gap: 15px; margin-top: 15px; width: 800px; max-width: 100vw; justify-content: space-around; padding: 0 10px; }
        .btn { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; border: 2px solid #00ffcc; background: #0d1117; color: #fff; border-radius: 8px; cursor: pointer; text-shadow: 0 0 5px #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,.2); transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn:disabled { border-color: #555; color: #555; text-shadow: none; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Счет: <span id="sc">0</span></div>
        <div>Жизни: <span id="lv">5</span></div>
        <div>Уровень: <span id="tier">1</span></div>
    </div>
    <canvas id="canv" width="800" height="600"></canvas>
    <div id="btn-container">
        <button id="ultBtn" class="btn" disabled>УЛЬТА (30с)</button>
        <button id="upgBtn" class="btn" disabled>АПГРЕЙД (60с)</button>
    </div>
<script>
const cv = document.getElementById("canv"), ctx = cv.getContext("2d");
const scEl = document.getElementById("sc"), lvEl = document.getElementById("lv"), tierEl = document.getElementById("tier");
const ultBtn = document.getElementById("ultBtn"), upgBtn = document.getElementById("upgBtn");

let score = 0, lives = 5, gameOver = false, spawnTimer;
let ultTimeLeft = 30, upgTimeLeft = 60, towerTier = 1, shockwave = null, lastTime = 0;
const bullets = [], enemies = [], particles = [], mouse = { x: 400, y: 300 };
const tower = { x: 400, y: 300, r: 35, angle: 0, targetAngle: 0, cd: 0, fireRate: 14, bulletSpeed: 9 };

// Сверхнадежный расчет координат, работающий при любом скролле/масштабе
const handlePointer = (clientX, clientY) => {
    const r = cv.getBoundingClientRect();
    // Исключаем деление на ноль, если Canvas скрыт
    if (r.width === 0 || r.height === 0) return;
    
    // Переводим экранные пиксели в систему координат Canvas (800x600)
    const rawX = (clientX - r.left) * (cv.width / r.width);
    const rawY = (clientY - r.top) * (cv.height / r.height);
    
    // Защита от NaN при вылете пальца за пределы экрана
    if (!isNaN(rawX) && !isNaN(rawY)) {
        mouse.x = rawX;
        mouse.y = rawY;
    }
};

// События мыши для ПК
window.addEventListener('mousemove', (e) => { handlePointer(e.clientX, e.clientY); });
window.addEventListener('mousedown', (e) => { handlePointer(e.clientX, e.clientY); });

// Жесткая блокировка стандартных мобильных жестов и считывание тач-событий
const preventAndTouch = (e) => {
    if (e.cancelable) e.preventDefault();
    if (e.touches && e.touches.length > 0) {
        handlePointer(e.touches[0].clientX, e.touches[0].clientY);
    }
};

cv.addEventListener('touchstart', (e) => {
    preventAndTouch(e);
    if (gameOver) restart();
}, { passive: false });
cv.addEventListener('touchmove', preventAndTouch, { passive: false });
window.addEventListener('touchend', (e) => {
    // Если пальцы убраны, не сбрасываем координаты в 0, а оставляем на последней точке
    if (e.touches && e.touches.length > 0) {
        handlePointer(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

cv.onclick = () => { if (gameOver) restart(); };

ultBtn.onclick = (e) => {
    e.stopPropagation();
    if (ultTimeLeft > 0 || gameOver) return;
    shockwave = { x: tower.x, y: tower.y, r: tower.r, maxR: 500 };
    ultTimeLeft = 30; ultBtn.disabled = true;
};

upgBtn.onclick = (e) => {
    e.stopPropagation();
    if (upgTimeLeft > 0 || gameOver) return;
    towerTier++;
    tower.fireRate = Math.max(4, tower.fireRate - 3);
    tower.bulletSpeed += 1;
    tierEl.textContent = towerTier;
    upgTimeLeft = 60; upgBtn.disabled = true;
};

function updateTimers(dt) {
    if (gameOver) return;
    if (ultTimeLeft > 0) {
        ultTimeLeft -= dt;
        ultBtn.textContent = `УЛЬТА (${Math.ceil(ultTimeLeft)}с)`;
        if (ultTimeLeft <= 0) { ultTimeLeft = 0; ultBtn.disabled = false; ultBtn.textContent = "УЛЬТА ГОТОВА"; }
    }
    if (upgTimeLeft > 0) {
        upgTimeLeft -= dt;
        upgBtn.textContent = `АПГРЕЙД (${Math.ceil(upgTimeLeft)}с)`;
        if (upgTimeLeft <= 0) { upgTimeLeft = 0; upgBtn.disabled = false; upgBtn.textContent = "УЛУЧШИТЬ БАШНЮ"; }
    }
}

const restart = () => {
    score = 0; lives = 5; towerTier = 1; gameOver = false;
    tower.fireRate = 14; tower.bulletSpeed = 9; shockwave = null;
    bullets.length = enemies.length = particles.length = 0;
    ultTimeLeft = 30; upgTimeLeft = 60;
    ultBtn.disabled = upgBtn.disabled = true;
    scEl.textContent = score; lvEl.textContent = lives; tierEl.textContent = towerTier;
    clearTimeout(spawnTimer);
    lastTime = performance.now();
    spawn(); animate(lastTime);
};

const addParticles = (x, y, color, count = 12) => {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
        particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 2 + Math.random() * 3, alpha: 1, col: color });
    }
};

const spawn = () => {
    if (gameOver) return;
    const s = 28 + Math.random() * 37;
    const side = Math.random() < 0.5;
    const x = side ? (Math.random() < 0.5 ? -s : cv.width + s) : Math.random() * cv.width;
    const y = side ? Math.random() * cv.height : (Math.random() < 0.5 ? -s : cv.height + s);
    const a = Math.atan2(tower.y - y, tower.x - x);
    const sp = Math.min(2.8, (1.2 + Math.random() * 1.5) * (40 / s));
    const hp = Math.ceil(s / 25); 

    enemies.push({ x, y, s, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, hp, maxHp: hp, col: `hsl(${Math.random() * 360},90%,60%)` });
    spawnTimer = setTimeout(spawn, Math.max(450, 1800 - score * 35));
};

function animate(timestamp) {
    if (gameOver) return;
    requestAnimationFrame(animate);
    
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    updateTimers(dt);
    
    ctx.fillStyle = "rgba(13, 17, 23, 0.25)"; ctx.fillRect(0, 0, cv.width, cv.height);

    ctx.strokeStyle = "rgba(0, 255, 204, 0.03)"; ctx.lineWidth = 1;
    for(let i=0; i<cv.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,cv.height); ctx.stroke(); }
    for(let j=0; j<cv.height; j+=40) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(cv.width,j); ctx.stroke(); }

    if (shockwave) {
        shockwave.r += 15;
        ctx.save();
        ctx.strokeStyle = "rgba(0, 255, 255, " + (1 - shockwave.r / shockwave.maxR) + ")";
        ctx.lineWidth = 6; ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
        ctx.beginPath(); ctx.arc(shockwave.x, shockwave.y, shockwave.r, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
        if (shockwave.r >= shockwave.maxR) shockwave = null;
    }

    // Линейная интерполяция угла (плавное, но моментальное следование башни без дерганья)
    tower.targetAngle = Math.atan2(mouse.y - tower.y, mouse.x - tower.x);
    let diff = tower.targetAngle - tower.angle;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    tower.angle += diff * 0.4; 

    if (--tower.cd <= 0) {
        const angles = towerTier >= 3 ? [tower.angle - 0.18, tower.angle, tower.angle + 0.18] : [tower.angle];
        angles.forEach(ang => {
            bullets.push({ x: tower.x + Math.cos(ang) * tower.r, y: tower.y + Math.sin(ang) * tower.r, vx: Math.cos(ang) * tower.bulletSpeed, vy: Math.sin(ang) * tower.bulletSpeed });
        });
        tower.cd = tower.fireRate;
    }

    ctx.save();
    const tCol = towerTier === 1 ? "#00ffcc" : towerTier === 2 ? "#ffff00" : "#ff0055";
    ctx.shadowBlur = 15; ctx.shadowColor = tCol;
    ctx.translate(tower.x, tower.y); ctx.rotate(tower.angle);
    ctx.fillStyle = "#0d1117"; ctx.strokeStyle = tCol; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, tower.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = tCol; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(10, -6, 35, 12);
    ctx.restore();

    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i]; b.x += b.vx; b.y += b.vy;
        ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fill();
        if (b.x < 0 || b.x > cv.width || b.y < 0 || b.y > cv.height) bullets.splice(i, 1);
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i]; e.x += e.vx; e.y += e.vy;

        if (shockwave && Math.hypot(shockwave.x - e.x, shockwave.y - e.y) < shockwave.r) {
            addParticles(e.x, e.y, e.col, 20); enemies.splice(i, 1); scEl.textContent = ++score;
            continue;
        }

        ctx.shadowBlur = 8; ctx.shadowColor = e.col;
        ctx.fillStyle = "rgba(13,17,23,0.8)"; ctx.strokeStyle = e.col; ctx.lineWidth = 3;
        ctx.fillRect(e.x - e.s / 2, e.y - e.s / 2, e.s, e.s); ctx.strokeRect(e.x - e.s / 2, e.y - e.s / 2, e.s, e.s);
        ctx.shadowBlur = 0;

        if (e.maxHp > 1) {
            ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(e.x - e.s/2, e.y - e.s/2 - 10, e.s, 4);
            ctx.fillStyle = e.col; ctx.fillRect(e.x - e.s/2, e.y - e.s/2 - 10, e.s * (e.hp / e.maxHp), 4);
        }

        ctx.fillStyle = "#fff"; ctx.fillRect(e.x - e.s*0.25, e.y - e.s*0.2, e.s*0.18, e.s*0.18); ctx.fillRect(e.x + e.s*0.1, e.y - e.s*0.2, e.s*0.18, e.s*0.18);
        ctx.fillStyle = "#000"; ctx.fillRect(e.x - e.s*0.22, e.y - e.s*0.17, e.s*0.08, e.s*0.08); ctx.fillRect(e.x + e.s*0.13, e.y - e.s*0.17, e.s*0.08, e.s*0.08);

        if (Math.hypot(tower.x - e.x, tower.y - e.y) < tower.r + e.s / 2) {
            addParticles(e.x, e.y, e.col); enemies.splice(i, 1); lvEl.textContent = --lives;
            if (lives <= 0) {
                gameOver = true;
                ctx.fillStyle = "rgba(5, 5, 15, 0.9)"; ctx.fillRect(0, 0, cv.width, cv.height);
                ctx.fillStyle = "#ff3333"; ctx.font = "bold 52px sans-serif"; ctx.textAlign = "center"; ctx.fillText("ИГРА ОКОНЧЕНА", 400, 280);
                ctx.fillStyle = "#fff"; ctx.font = "24px sans-serif"; ctx.fillText("Тапните по экрану для перезапуска", 400, 340);
            }
            continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < (e.s / 2) + 12) {
                bullets.splice(j, 1); e.hp--;
                addParticles(b.x, b.y, "#ff00ff", 4);
                if (e.hp <= 0) { addParticles(e.x, e.y, e.col); enemies.splice(i, 1); scEl.textContent = ++score; }
                break;
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
}

lastTime = performance.now();
spawn(); animate(lastTime);
</script>
</body>
</html>
